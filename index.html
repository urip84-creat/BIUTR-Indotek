<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIUTR - Bandung Intra Urban Toll Road</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  #header {
    background: #1a237e; color: white; padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
    z-index: 1000; box-shadow: 0 2px 6px rgba(0,0,0,0.3); flex-shrink: 0;
  }
  #header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
  #header p  { font-size: 11px; opacity: 0.8; }
  #map { flex: 1; }

  /* PANEL */
  #panel {
    position: absolute; top: 70px; left: 12px; z-index: 999;
    background: white; border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2); width: 248px; overflow: hidden;
  }
  #panel-header {
    background: #1a237e; color: white; padding: 8px 12px; font-size: 12px;
    font-weight: 600; letter-spacing: 0.5px; display: flex;
    justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none;
  }
  #panel-body { padding: 10px 12px; max-height: calc(100vh - 180px); overflow-y: auto; }
  .layer-group { margin-bottom: 10px; }
  .layer-group-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    color: #555; letter-spacing: 0.8px; margin-bottom: 6px;
    padding-bottom: 3px; border-bottom: 1px solid #eee;
  }
  .layer-item {
    display: flex; align-items: center; gap: 8px; padding: 4px 2px;
    cursor: pointer; border-radius: 4px; transition: background 0.15s;
  }
  .layer-item:hover { background: #f5f5f5; }
  .layer-item input[type=checkbox] { cursor: pointer; accent-color: #1a237e; width: 14px; height: 14px; flex-shrink: 0; }
  .sym { width: 28px; height: 14px; flex-shrink: 0; display: flex; align-items: center; }
  .sym-line      { height: 4px; width: 100%; border-radius: 2px; }
  .sym-line-dash { height: 0; width: 100%; border-top: 3px dashed; }
  .sym-line-dot  { height: 0; width: 100%; border-top: 3px dotted; }
  .sym-point     { width: 11px; height: 11px; border-radius: 50%; margin: auto; border: 2px solid white; box-shadow: 0 0 0 1.5px #aaa; }
  .layer-label   { font-size: 12px; color: #333; flex: 1; line-height: 1.3; }
  .divider { border: none; border-top: 1px solid #eee; margin: 8px 0; }
  .basemap-btn {
    display: block; width: 100%; padding: 5px 8px; margin-bottom: 4px;
    font-size: 11px; border: 1px solid #ddd; border-radius: 4px;
    cursor: pointer; background: white; text-align: left; transition: all 0.15s; color: #333;
  }
  .basemap-btn:hover { background: #e8eaf6; border-color: #1a237e; }
  .basemap-btn.active { background: #1a237e; color: white; border-color: #1a237e; font-weight: 600; }

  /* INFO BOX */
  #info-box {
    position: absolute; bottom: 50px; left: 12px; z-index: 999;
    background: white; border-radius: 6px; padding: 8px 12px;
    font-size: 12px; max-width: 270px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    display: none; border-left: 4px solid #1a237e;
  }
  #info-box .info-title { font-weight: 700; color: #1a237e; margin-bottom: 6px; font-size: 13px; }
  #info-box .info-row { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
  #info-box .info-row:last-child { border-bottom: none; }
  #info-box .info-key { color: #777; flex-shrink: 0; }
  #info-box .info-val { font-weight: 500; color: #222; text-align: right; }
  #info-close { float: right; cursor: pointer; color: #aaa; font-size: 14px; font-weight: bold; line-height: 1; margin-left: 6px; }
  #info-close:hover { color: #333; }

  /* KOORDINAT BAR */
  #coord-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 999;
    background: rgba(26,35,126,0.9); color: white;
    padding: 4px 14px; font-size: 11px; font-family: monospace;
    display: flex; gap: 20px; align-items: center;
  }
  #coord-bar span { opacity: 0.8; }
  #coord-lat, #coord-lng, #coord-zoom { font-weight: 700; color: #90caf9; }

  /* Leaflet Measure custom */
  .leaflet-control-measure { font-size: 12px !important; }
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>🛣️ BIUTR — Bandung Intra Urban Toll Road</h1>
    <p>Aplikasi Web GIS | Trase Rencana Seksi 1 – 6</p>
  </div>
</div>

<div id="map"></div>

<div id="panel">
  <div id="panel-header" onclick="togglePanel()">
    <span>☰ Layer &amp; Basemap</span>
    <span id="toggle-icon">▲</span>
  </div>
  <div id="panel-body">

    <div class="layer-group">
      <div class="layer-group-title">Trase BIUTR — Tipe Struktur</div>
      <label class="layer-item">
        <input type="checkbox" checked onchange="toggleStruct('Elevated Section',this.checked)">
        <div class="sym"><div class="sym-line" style="background:#e53935;"></div></div>
        <span class="layer-label">Elevated Section</span>
      </label>
      <label class="layer-item">
        <input type="checkbox" checked onchange="toggleStruct('At Grade Section',this.checked)">
        <div class="sym"><div class="sym-line" style="background:#43a047;"></div></div>
        <span class="layer-label">At Grade Section</span>
      </label>
      <label class="layer-item">
        <input type="checkbox" checked onchange="toggleStruct('Transition Section',this.checked)">
        <div class="sym"><div class="sym-line-dash" style="border-color:#fb8c00;"></div></div>
        <span class="layer-label">Transition Section</span>
      </label>
      <label class="layer-item">
        <input type="checkbox" checked onchange="toggleStruct('Tunnel Section',this.checked)">
        <div class="sym"><div class="sym-line-dot" style="border-color:#6d4c41;"></div></div>
        <span class="layer-label">Tunnel Section</span>
      </label>
      <label class="layer-item">
        <input type="checkbox" checked onchange="toggleStruct('Pasupati Bridge',this.checked)">
        <div class="sym"><div class="sym-line" style="background:#8e24aa;"></div></div>
        <span class="layer-label">Pasupati Bridge</span>
      </label>
      <label class="layer-item">
        <input type="checkbox" checked onchange="toggleStruct('Toll Junction',this.checked)">
        <div class="sym"><div class="sym-line" style="background:#00838f;"></div></div>
        <span class="layer-label">Toll Junction</span>
      </label>
    </div>

    <div class="layer-group">
      <div class="layer-group-title">Titik &amp; Label</div>
      <label class="layer-item">
        <input type="checkbox" checked onchange="toggleLayer(stasiunLayer,this.checked)">
        <div class="sym"><div class="sym-point" style="background:#ff6f00;"></div></div>
        <span class="layer-label">Stasiun / Simpul</span>
      </label>
      <label class="layer-item">
        <input type="checkbox" checked onchange="toggleLayer(labelGroup,this.checked)">
        <div class="sym" style="font-size:10px;font-weight:700;color:#333;">Aa</div>
        <span class="layer-label">Nama Stasiun</span>
      </label>
    </div>

    <hr class="divider">

    <div class="layer-group">
      <div class="layer-group-title">Basemap</div>
      <button class="basemap-btn" id="btn-osm"    onclick="switchBasemap('osm')">🗺️ OpenStreetMap</button>
      <button class="basemap-btn" id="btn-sat"    onclick="switchBasemap('satellite')">🛰️ Satellite (Esri)</button>
      <button class="basemap-btn active" id="btn-hybrid" onclick="switchBasemap('hybrid')">🌐 Hybrid — Foto + Nama Jalan ★</button>
      <button class="basemap-btn" id="btn-topo"   onclick="switchBasemap('topo')">🏔️ Topografi</button>
    </div>

  </div>
</div>

<div id="info-box">
  <span id="info-close" onclick="document.getElementById('info-box').style.display='none'">✕</span>
  <div class="info-title" id="info-title"></div>
  <div id="info-content"></div>
</div>

<!-- Koordinat bar bawah -->
<div id="coord-bar">
  <span>📍 Lat: <span id="coord-lat">-</span></span>
  <span>Lng: <span id="coord-lng">-</span></span>
  <span>Zoom: <span id="coord-zoom">-</span></span>
</div>

<script>
const map = L.map('map', { zoomControl: true }).setView([-6.915, 107.650], 12);
map.zoomControl.setPosition('topright');

// ── BASEMAPS ──────────────────────────────────────────────────────────
const basemaps = {
  osm:       L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ attribution:'© OpenStreetMap', maxZoom:19 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{ attribution:'© Esri', maxZoom:19 }),
  hybridSat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{ attribution:'© Esri World Imagery + HERE', maxZoom:19 }),
  hybridLbl: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}',{ attribution:'', maxZoom:19, opacity:1 }),
  hybridLbl2:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{ attribution:'', maxZoom:19, opacity:1 }),
  topo:      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{ attribution:'© OpenTopoMap', maxZoom:17 })
};

// Default: Hybrid
basemaps.hybridSat.addTo(map);
basemaps.hybridLbl.addTo(map);
basemaps.hybridLbl2.addTo(map);

function switchBasemap(name) {
  Object.values(basemaps).forEach(b=>{ if(map.hasLayer(b)) map.removeLayer(b); });
  if(name==='osm')      { basemaps.osm.addTo(map); }
  if(name==='satellite'){ basemaps.satellite.addTo(map); }
  if(name==='hybrid')   { basemaps.hybridSat.addTo(map); basemaps.hybridLbl.addTo(map); basemaps.hybridLbl2.addTo(map); }
  if(name==='topo')     { basemaps.topo.addTo(map); }
  document.querySelectorAll('.basemap-btn').forEach(b=>b.classList.remove('active'));
  ({osm:'btn-osm',satellite:'btn-sat',hybrid:'btn-hybrid',topo:'btn-topo'})[name] &&
    document.getElementById(({osm:'btn-osm',satellite:'btn-sat',hybrid:'btn-hybrid',topo:'btn-topo'})[name]).classList.add('active');
  Object.values(structLayers).forEach(lg=>{ if(map.hasLayer(lg)) lg.bringToFront(); });
  if(map.hasLayer(stasiunLayer)) stasiunLayer.bringToFront();
  if(map.hasLayer(labelGroup))   labelGroup.bringToFront();
}

// ── KOORDINAT REAL-TIME ───────────────────────────────────────────────
map.on('mousemove', function(e) {
  document.getElementById('coord-lat').textContent  = e.latlng.lat.toFixed(6);
  document.getElementById('coord-lng').textContent  = e.latlng.lng.toFixed(6);
});
map.on('zoomend', function() {
  document.getElementById('coord-zoom').textContent = map.getZoom();
});
document.getElementById('coord-zoom').textContent = map.getZoom();

// ── PENGUKUR JARAK ────────────────────────────────────────────────────
L.control.measure({
  position: 'topright',
  primaryLengthUnit: 'meters',
  secondaryLengthUnit: 'kilometers',
  primaryAreaUnit: 'sqmeters',
  secondaryAreaUnit: 'hectares',
  activeColor: '#e53935',
  completedColor: '#1a237e',

}).addTo(map);

// ── RENDER TRASE ──────────────────────────────────────────────────────
const structLayers = {};

function showInfo(title, rows) {
  document.getElementById('info-title').textContent = title;
  document.getElementById('info-content').innerHTML =
    rows.map(r=>`<div class="info-row"><span class="info-key">${r[0]}</span><span class="info-val">${r[1]}</span></div>`).join('');
  document.getElementById('info-box').style.display = 'block';
}

geojsonData.features.forEach(f => {
  const struk = f.properties.Struktur;
  const s = structStyle[struk] || { color:'#1a237e', weight:3, dashArray:null };
  const layer = L.geoJSON(f, {
    style: { color:s.color, weight:s.weight, opacity:1, dashArray:s.dashArray }
  }).on('click', () => showInfo(f.properties.Nama + ' — ' + struk, [
    ['Seksi', f.properties.Seksi],
    ['Struktur', struk]
  ]));
  const key = struk === 'Tol Junction' ? 'Toll Junction' : struk;
  if (!structLayers[key]) structLayers[key] = L.layerGroup();
  structLayers[key].addLayer(layer);
});

Object.values(structLayers).forEach(lg => lg.addTo(map));

function toggleStruct(name, show) {
  const lg = structLayers[name];
  if (!lg) return;
  show ? lg.addTo(map) : map.removeLayer(lg);
}

// ── STASIUN ───────────────────────────────────────────────────────────
const stasiunData = [
  { nama:"Pasteur",         lat:-6.8891, lng:107.5682, tipe:"Gerbang Tol",   seksi:"Seksi 1" },
  { nama:"Junjunan",        lat:-6.8936, lng:107.5861, tipe:"Simpang Susun", seksi:"Seksi 1" },
  { nama:"Pasupati Bridge", lat:-6.8985, lng:107.5937, tipe:"Jembatan",      seksi:"Seksi 1" },
  { nama:"Cicaheum",        lat:-6.9040, lng:107.6656, tipe:"Simpang Susun", seksi:"Seksi 2/3" },
  { nama:"Ujung Berung",    lat:-6.9128, lng:107.7018, tipe:"Simpang Susun", seksi:"Seksi 3" },
  { nama:"Soekarno Hatta",  lat:-6.9330, lng:107.7160, tipe:"Toll Junction", seksi:"Seksi 4/5" },
  { nama:"Cibiru",          lat:-6.9395, lng:107.7388, tipe:"Simpang Susun", seksi:"Seksi 4" },
  { nama:"Cileunyi",        lat:-6.9519, lng:107.7588, tipe:"Gerbang Tol",   seksi:"Seksi 6" }
];

const stasiunIcon = L.divIcon({
  html:'<div style="width:14px;height:14px;background:#ff6f00;border-radius:50%;border:3px solid white;box-shadow:0 1px 5px rgba(0,0,0,0.6);"></div>',
  className:'', iconSize:[14,14], iconAnchor:[7,7]
});

const stasiunLayer = L.layerGroup();
const labelGroup   = L.layerGroup();

stasiunData.forEach(s => {
  const m = L.marker([s.lat,s.lng],{icon:stasiunIcon});
  m.on('click',()=>showInfo(s.nama,[['Tipe',s.tipe],['Seksi',s.seksi],['Koordinat',`${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}`]]));
  stasiunLayer.addLayer(m);
  const lbl = L.marker([s.lat,s.lng],{
    icon:L.divIcon({
      html:`<div style="font-size:11px;font-weight:700;color:#fff;text-shadow:0 0 3px #000,0 0 3px #000;white-space:nowrap;padding-left:10px;margin-top:-18px;">${s.nama}</div>`,
      className:'', iconAnchor:[0,0]
    })
  });
  labelGroup.addLayer(lbl);
});

stasiunLayer.addTo(map);
labelGroup.addTo(map);

function toggleLayer(lg,show) { show ? lg.addTo(map) : map.removeLayer(lg); }

function togglePanel() {
  const b=document.getElementById('panel-body');
  const i=document.getElementById('toggle-icon');
  if(b.style.display==='none'){b.style.display='';i.textContent='▲';}
  else{b.style.display='none';i.textContent='▼';}
}

map.fitBounds(L.geoJSON(geojsonData).getBounds(),{padding:[60,60]});
